<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>oi, me desculpinha 🥹</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    img {
      width: 100%;
      max-width: 250px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    button {
      margin-top: 15px;
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 20px;
      background-color: white;
      color: #ff4b5c;
      cursor: pointer;
    }

    audio {
      margin-top: 15px;
      width: 100%;
    }
  </style>
</head>

<body>

<div class="container">

  <img src="https://raw.githubusercontent.com/11666-cpu/Desculpinha-/main/IMG-20260427-WA0175(1).jpg">

  <h1>Me desculpinha minha neném 🥹</h1>

  <p>
    Eu juro que não fiz nada de propósito...<br><br>
    Eu nem falo com aquela garota 😭<br><br>
    Você é a única pra mim ❤️<br><br>
    Me desculpa vai... 🥹
  </p>

  <!-- 🎵 PLAYER VISÍVEL -->
  <audio id="musica" controls preload="auto">
    <source src="Musica de fundo mais triste do chaves (MP3_160K).mp3" type="audio/mpeg">
  </audio>

  <!-- BOTÃO PRA FORÇAR PLAY -->
  <button onclick="playMusic()">Tocar música triste 🎵</button>

</div>

<script>
  function playMusic() {
    const m = document.getElementById("musica");
    m.play().catch(err => {
      alert("Toca no player abaixo 👇");
    });
  }
</script>

</body>
</html>
